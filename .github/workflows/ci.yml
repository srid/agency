name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  apm-sync:
    name: APM sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: just apm-sync
